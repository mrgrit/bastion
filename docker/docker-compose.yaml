version: "3.8"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: bastion
      POSTGRES_PASSWORD: bastion
      POSTGRES_DB: bastion
    ports:
      - "5433:5432"
    volumes:
      - bastion-pgdata:/var/lib/postgresql/data

  bastion-api:
    build: ..
    command: >
      python -m uvicorn apps.bastion-api.src.main:app
      --host 0.0.0.0 --port 9000
    environment:
      DATABASE_URL: postgresql://bastion:bastion@postgres:5432/bastion
      BASTION_API_KEY: bastion-api-key-2026
    ports:
      - "9000:9000"
    depends_on:
      - postgres

volumes:
  bastion-pgdata:
